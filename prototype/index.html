<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Mission Control | TranspoTrack</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Google Fonts: Inter & JetBrains Mono -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-slate-100 font-sans h-screen flex flex-col overflow-hidden" x-data="missionControl">

    <!-- Global Top Header -->
    <header class="h-16 bg-slate-900 border-b-2 border-blue-900 flex items-center justify-between px-8 z-30 shadow-md relative">
        <div class="flex items-center gap-5 relative z-10">
            <!-- Branding Container -->
            <div class="flex items-center justify-center bg-slate-800 border border-slate-700 rounded p-1 min-w-[40px] min-h-[40px] shadow-sm">
                <div class="w-8 h-8 bg-blue-600 rounded-sm flex items-center justify-center text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
            </div>

            <!-- Title Branding -->
            <div class="flex flex-col">
                <h1 class="text-base font-extrabold tracking-tight text-slate-100 leading-none uppercase">LEYTE EXPRESS</h1>
                <h2 class="text-[9px] font-bold tracking-widest text-slate-400 uppercase mt-0.5">
                    FLEET MANAGEMENT DASHBOARD
                </h2>
            </div>
        </div>

        <div class="flex items-center gap-8 relative z-10">
            <!-- System Parameters -->
            <div class="flex items-center gap-4 border-r border-slate-700 pr-8">
                <div class="flex flex-col items-end">
                    <span class="text-[8px] uppercase tracking-widest font-bold text-slate-500">System Status</span>
                    <div class="flex items-center gap-1.5">
                        <span class="w-2 h-2 rounded-full bg-green-500"></span>
                        <span class="text-xs font-bold text-green-400 uppercase">Operational</span>
                    </div>
                </div>
            </div>

            <!-- Terminal Clock -->
            <div class="text-right">
                <span class="block text-[8px] text-slate-500 uppercase tracking-widest font-bold">Local Terminal Time</span>
                <span class="text-xl font-mono font-bold text-slate-100 tracking-tighter" x-text="currentTime">--:--:--</span>
            </div>

            <button @click="startTour()" 
                    class="ml-4 px-4 py-2 bg-blue-700 hover:bg-blue-600 text-white text-[10px] font-bold rounded shadow transition-all uppercase tracking-widest focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                System Guide
            </button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        <!-- Instruction Modal -->
        <template x-if="tourActive">
            <div class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950/60 backdrop-blur-sm pointer-events-auto">
                <div class="tour-modal w-full max-w-md overflow-hidden animate-in fade-in zoom-in duration-200">
                    <!-- Progress Header -->
                    <div class="h-1.5 bg-slate-800 relative">
                        <div class="h-full bg-blue-600 transition-all duration-500 shadow-sm" 
                             :style="`width: ${((tourStep + 1) / tourSteps.length) * 100}%` "></div>
                    </div>

                    <div class="p-8">
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-[10px] font-bold text-blue-400 uppercase tracking-widest" x-text="`Instruction Phase ${tourStep + 1} of ${tourSteps.length}`"></span>
                            <button @click="endTour()" class="text-slate-500 hover:text-slate-300 transition-colors">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                                </svg>
                            </button>
                        </div>

                        <h3 class="text-2xl font-bold text-slate-100 mb-3 tracking-tight" x-text="tourSteps[tourStep].title"></h3>
                        <p class="text-slate-400 text-sm leading-relaxed" x-text="tourSteps[tourStep].content"></p>
                    </div>

                    <!-- Modal Actions -->
                    <div class="px-8 py-5 bg-slate-900 flex justify-between items-center border-t border-slate-800">
                        <button @click="prevStep()" :disabled="tourStep === 0" 
                                class="text-[10px] font-bold uppercase tracking-widest text-slate-500 hover:text-slate-300 disabled:opacity-0 transition-opacity">
                            Go Back
                        </button>
                        <div class="flex items-center gap-4">
                            <button @click="endTour()" class="text-[10px] font-bold uppercase tracking-widest text-slate-500 hover:text-slate-300 transition-colors">
                                Close
                            </button>
                            <button @click="nextStep()" 
                                    class="px-6 py-2.5 bg-blue-700 hover:bg-blue-600 text-white rounded text-[10px] font-bold uppercase tracking-widest shadow-md transition-all active:scale-95"
                                    x-text="tourStep === tourSteps.length - 1 ? 'Finish' : 'Next Step'">
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <!-- Left Sidebar: Fleet Inventory -->
        <aside id="sidebar-feed" class="w-80 border-r border-slate-800 bg-slate-900 flex flex-col h-full z-20 shadow-lg transition-colors duration-300">
            <header class="p-6 border-b border-slate-800 bg-slate-900/50">
                <div class="flex items-center justify-between">
                    <h2 class="text-[10px] font-bold tracking-widest text-slate-500 uppercase">Fleet Inventory</h2>
                    <span class="px-2 py-0.5 rounded-full bg-blue-900/30 text-[9px] text-blue-400 font-bold border border-blue-800/50" x-text="`${vans.length} UNITS ONLINE` "></span>
                </div>
            </header>

            <div id="fleet-list" class="flex-1 overflow-y-auto p-4 space-y-3 scroll-smooth">
                <!-- Van Cards -->
                <template x-for="van in vans" :key="van.id">
                    <div :id="`van-card-${van.id}`" 
                         @click="selectVan(van.id)"
                         class="van-card p-4 rounded-lg cursor-pointer relative transition-all duration-200 overflow-hidden"
                         :class="{ 
                            'border-blue-600 ring-1 ring-blue-600/20 bg-slate-800/80 selected': (tourActive && tourSteps[tourStep].highlightVan === van.id) || selectedVanId === van.id,
                            'border-green-500/20 bg-green-500/5': van.nearTerminal && selectedVanId !== van.id
                         }">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-bold text-slate-100 text-sm" x-text="`Unit #${van.id}`"></h3>
                                <p class="text-[10px] text-slate-400 font-medium tracking-tight" x-text="van.driver"></p>
                            </div>
                            <div class="flex flex-col items-end gap-1">
                                <span class="status-badge" :class="getStatusColor(van.status)" x-text="van.status"></span>
                                <span x-show="selectedVanId === van.id && isLocked" 
                                      class="text-[7px] font-extrabold px-1.5 py-0.5 rounded bg-blue-700 text-white uppercase tracking-tighter shadow-sm">Tracking</span>
                            </div>
                        </div>

                        <div class="flex items-end justify-between mt-4">
                            <div class="flex flex-col">
                                <span class="text-[9px] text-slate-500 uppercase font-black tracking-tighter">EST. ARRIVAL</span>
                                <span class="text-xl font-mono font-bold text-slate-200 leading-none" x-text="`${van.eta} min`" x-show="van.status !== 'Stalled'"></span>
                                <span class="text-xl font-mono font-bold text-slate-600 leading-none" x-show="van.status === 'Stalled'">--</span>
                            </div>
                            <div class="w-8 h-8 rounded bg-slate-800 border border-slate-700 flex items-center justify-center text-slate-500 shadow-inner">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <!-- Footer Stats -->
            <footer class="p-5 border-t border-slate-800 bg-slate-900/50">
                <div class="space-y-3">
                    <div class="flex items-center justify-between">
                        <span class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Resource Allocation</span>
                        <div class="flex items-center gap-2">
                            <div class="w-16 h-1.5 bg-slate-800 rounded-full overflow-hidden">
                                <div class="h-full bg-blue-600" style="width: 72%"></div>
                            </div>
                            <span class="text-[10px] font-bold text-slate-400">72%</span>
                        </div>
                    </div>
                </div>
            </footer>
        </aside>

        <!-- Main Body: Geolocation Tracking -->
        <main id="geospatial-view" class="flex-1 relative bg-slate-950 overflow-hidden transition-all duration-300"
               :class="tourActive && tourSteps[tourStep].target === 'map' ? 'ring-4 ring-inset ring-blue-700/10' : ''">
            <div id="map" class="absolute inset-0 z-10 w-full h-full"></div>

            <!-- Dashboard Legend -->
            <div class="absolute bottom-6 right-6 z-20 bg-slate-900/90 backdrop-blur p-4 border border-slate-800 rounded shadow-2xl pointer-events-none">
                <h4 class="text-[9px] font-extrabold text-slate-500 mb-2 uppercase tracking-widest">Map Legend</h4>
                <div class="space-y-2">
                    <div class="flex items-center gap-3">
                        <span class="w-2.5 h-2.5 rounded-full bg-blue-500 shadow-sm"></span>
                        <span class="text-[10px] font-bold text-slate-300 uppercase">In Transit Unit</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="w-2.5 h-2.5 rounded-full bg-green-500 shadow-sm"></span>
                        <span class="text-[10px] font-bold text-slate-300 uppercase">Transport Terminal</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="w-2.5 h-2.5 rounded-full border-2 border-dashed border-blue-500/30"></div>
                        <span class="text-[10px] font-bold text-slate-300 uppercase">Operational Zone</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
